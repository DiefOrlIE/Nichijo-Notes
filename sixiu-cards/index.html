<style>

    max-width:760px; margin:12px auto 0; padding:0 16px;

  .bar{ height:6px; background:var(--line); border-radius:3px; margin-top:6px; overflow:hidden; }

  .card{
    background:var(--card); border:1px solid var(--line);

  .front{ font-size:19px; line-height:1.9; }
  .front .blank{
    display:inline-block; min-width:48px; border-bottom:2px solid var(--accent);
    color:transparent; user-select:none;
  }
  .back{
    margin-top:18px; padding-top:18px; border-top:1px dashed var(--line);
    font-size:16px; line-height:2; color:#33302a; white-space:pre-line;
    display:none;
  }
  .back.show{ display:block; }
  .back b{ color:var(--accent); }
  .back .key{ color:var(--bad); font-weight:bold; }

  .actions{ margin-top:auto; padding-top:22px; display:flex; gap:10px; flex-wrap:wrap; }
  .actions .grow{ flex:1; min-width:120px; }
  .reveal{ background:var(--accent); color:#fff; border:none; }
  .know{ background:#eef6ef; border:1px solid var(--good); color:var(--good); }
  .dontknow{ background:#fbeeeb; border:1px solid var(--bad); color:var(--bad); }
  .actions button{ padding:11px 14px; border-radius:10px; font-family:inherit; font-size:15px; cursor:pointer; }

  .nav button{ background:none; border:none; color:var(--accent); font-family:inherit; font-size:15px; cursor:pointer; padding:6px 10px; }
  .nav .pos{ color:var(--sub); font-size:13px; }

  .status-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-left:8px; vertical-align:middle; }
  .dot-know{ background:var(--good); }
  .dot-dont{ background:var(--bad); }

  .empty{ text-align:center; color:var(--sub); padding:60px 0; }
  footer{ text-align:center; color:var(--sub); font-size:12px; padding:10px 0 30px; }

// ===== 状态 =====
const KEY="sixiu_cards_status_v1";
let status = JSON.parse(localStorage.getItem(KEY)||"{}"); // {id:"know"|"dont"}
let mode="cloze", section="全部", onlyDontMode=false;
let order=[], idx=0, revealed=false;

RAW.forEach((c,i)=>c.id=i);
document.getElementById("totalCount").textContent=RAW.length;

// 章节下拉
const sections=["全部",...[...new Set(RAW.map(c=>c.s))]];
const sel=document.getElementById("sectionSel");
sections.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o);});

function pool(){
  return RAW.filter(c=>{
    if(mode!=="all" && c.t!==mode) return false;
    if(section!=="全部" && c.s!==section) return false;
    if(onlyDontMode && status[c.id]==="know") return false;
    return true;
  });
}
function buildOrder(shuffle){
  order=pool().map(c=>c.id);
  if(shuffle){ for(let i=order.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[order[i],order[j]]=[order[j],order[i]];} }
  idx=0; revealed=false; render();
}
function clozeHTML(f){ return f.replace(/___/g,'<span class="blank">　答案　</span>'); }

function render(){
  const stage=document.getElementById("stage");
  updateProgress();
  if(order.length===0){ stage.innerHTML='<div class="empty">这个筛选下没有卡片 🎉<br>试试切换模式 / 章节 / 关掉「只看没会」</div>'; return; }
  if(idx>=order.length) idx=order.length-1;
  const c=RAW[order[idx]];
  const st=status[c.id];
  const dot = st? `<span class="status-dot ${st==='know'?'dot-know':'dot-dont'}"></span>`:"";
  const front = c.t==="cloze"? clozeHTML(c.f): c.f;
  stage.innerHTML=`
    <div class="card">
      <div class="tag">${c.s}${dot}<span class="mode">${c.t==='cloze'?'填空':'标题回忆'}</span></div>
      <div class="front">${front}</div>
      <div class="back ${revealed?'show':''}">${c.b}</div>
      <div class="actions">
        <button class="reveal grow" id="revealBtn">${revealed?'隐藏答案':'显示答案'}</button>
        <button class="know" id="knowBtn">✓ 会了</button>
        <button class="dontknow" id="dontBtn">✕ 没会</button>
      </div>
      <div class="nav">
        <button id="prevBtn">← 上一张</button>
        <span class="pos">${idx+1} / ${order.length}</span>
        <button id="nextBtn">下一张 →</button>
      </div>
    </div>`;
  document.getElementById("revealBtn").onclick=()=>{revealed=!revealed;render();};
  document.getElementById("knowBtn").onclick=()=>mark("know");
  document.getElementById("dontBtn").onclick=()=>mark("dont");
  document.getElementById("prevBtn").onclick=()=>{if(idx>0){idx--;revealed=false;render();}};
  document.getElementById("nextBtn").onclick=next;
}
function next(){ if(idx<order.length-1){idx++;revealed=false;render();} else {render();} }
function mark(v){
  const c=RAW[order[idx]];
  status[c.id]=v; localStorage.setItem(KEY,JSON.stringify(status));
  // 会了且开着「只看没会」时，当前卡会从池中消失，重建顺序但保位置
  if(onlyDontMode && v==="know"){ const keep=idx; buildOrder(false); idx=Math.min(keep,order.length-1); revealed=false; render(); }
  else next();
}
function updateProgress(){
  const total=RAW.length;
  const known=Object.values(status).filter(v=>v==="know").length;
  document.getElementById("progText").textContent=`已掌握 ${known} / ${total}`;
  document.getElementById("progBar").style.width=(known/total*100)+"%";
}

// 事件
document.querySelectorAll("#modeSeg button").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.remove("active"));b.classList.add("active");mode=b.dataset.mode;buildOrder(false);};
});
sel.onchange=()=>{section=sel.value;buildOrder(false);};
document.getElementById("shuffleBtn").onclick=()=>buildOrder(true);
document.getElementById("onlyDont").onclick=function(){onlyDontMode=!onlyDontMode;this.style.background=onlyDontMode?"var(--accent)":"";this.style.color=onlyDontMode?"#fff":"";buildOrder(false);};
document.getElementById("resetBtn").onclick=()=>{if(confirm("清空所有「会了/没会」标记？")){status={};localStorage.removeItem(KEY);buildOrder(false);}};

// 键盘：空格翻面，← → 切换
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();revealed=!revealed;render();}
  else if(e.code==="ArrowRight"){next();}
  else if(e.code==="ArrowLeft"){if(idx>0){idx--;revealed=false;render();}}
});

buildOrder(false);
</script>
